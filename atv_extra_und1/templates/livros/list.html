</a>

<hr>

<table border="1">

<tr>
    <th>Título</th>
    <th>Páginas</th>
    <th>Autor</th>
</tr>

{% for livro in livros %}
<tr>

    <td>{{ livro.paginas }}</td>
    <td>{{ livro.autor.nome }}</td>
</tr>
{% endfor %}

</table>

<h1>Novo Livro</h1>

<form method="post">

    {% csrf_token %}

    <input type="text"
           name="titulo"
           placeholder="Título">

    <br><br>

    <input type="number"
           name="paginas"
           placeholder="Páginas">

    <br><br>

    <select name="autor">

        {% for autor in autores %}
            <option value="{{ autor.id }}">
                {{ autor.nome }}
            </option>
        {% endfor %}

    </select>

    <br><br>

    <button type="submit">
        Salvar
    </button>

</form>

<br>

<a href="/livros/">Voltar</a>
